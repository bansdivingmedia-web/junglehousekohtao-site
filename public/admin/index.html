<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>COZY Koh Tao Admin</title>
    <style>
      .admin-quick-actions {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 10000;
        display: flex;
        gap: 10px;
      }

      .quick-action {
        border-radius: 4px;
        background: #11100f;
        color: #fffaf0;
        font: 700 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        padding: 12px 16px;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(12, 31, 23, 0.22);
      }

      .quick-action:hover {
        background: #21543f;
      }

      .quick-action-secondary {
        background: #5d3628;
      }

      .quick-action-secondary:hover {
        background: #744535;
      }
    </style>
  </head>
  <body>
    <div class="admin-quick-actions">
      <a class="quick-action" href="/" target="_blank" rel="noopener">View Website</a>
      <a class="quick-action quick-action-secondary" href="/logout/">Logout</a>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js"></script>
  </body>
</html>
